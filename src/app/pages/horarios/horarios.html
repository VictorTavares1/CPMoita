<div class="container py-4">
  <div class="page-with-sidebar">

    <div class="main-content">
      <h3 class="section-heading">Horário de Funcionamento</h3>
      <div class="section-underline"></div>

      <div class="mb-4">
        <select class="form-select" style="max-width: 400px;" (change)="onSetorChange($event)">
          <option value="secretaria">Secretaria</option>
          <option value="ninho">Ninho</option>
          <option value="coordenadora">Atendimento da Coordenadora Pedagógica</option>
          <option value="educadoras">Atendimento das Educadoras aos Encarregados de Educação</option>
        </select>
      </div>

      <div class="table-responsive">
        <table class="table table-bordered">
          <thead>
            <tr>
              <th>Dia da Semana</th>
              <th>Horário</th>
            </tr>
          </thead>
          <tbody>
            @for (entry of currentHorarios; track entry.dia) {
              <tr>
                <td>{{ entry.dia }}</td>
                <td>{{ entry.horario }}</td>
              </tr>
            }
          </tbody>
        </table>
      </div>
    </div>

    <!-- Sidebar -->
    <div>
      <h3 class="section-heading">Últimas Notícias</h3>
      <div class="section-underline"></div>
      @for (item of sidebarNews; track item.id) {
        <a [routerLink]="['/noticias', item.id]" class="sidebar-news-item">
          <div class="sidebar-news-image">
            <img [src]="getImageUrl(item.url)" [alt]="item.title">
          </div>
          <div class="sidebar-news-content">
            <h5>{{ item.title }}</h5>
            <small>{{ formatDate(item.dateHour) }}</small>
          </div>
        </a>
      }
      <a routerLink="/noticias" class="sidebar-view-all">Ver todas as notícias →</a>
    </div>

  </div>
</div>
