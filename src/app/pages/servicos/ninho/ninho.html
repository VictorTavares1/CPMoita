<div class="container py-4">
  <h1 class="section-heading text-center" style="margin: 30px 0;">
    {{ service?.titulo || 'Pré-Escolar "O Ninho"' }}
  </h1>
  <div class="section-underline"></div>

  <div class="mt-3" [innerHTML]="service?.descricao || 'Uma casa de gerações que gera ações, onde os valores familiares prevalecem. Com várias décadas de funcionamento, o nosso Ninho é conhecido por ser casa de várias gerações da mesma família.'"></div>

  <h2 class="section-heading text-center mt-4">Ninho por Cores</h2>
  <div class="section-underline"></div>

  <div class="d-flex gap-3 justify-content-center flex-wrap mt-3 mb-4">
    <button class="btn btn-success" (click)="selectCor('verde')">Verde</button>
    <button class="btn btn-primary" (click)="selectCor('azul')">Azul</button>
    <button class="btn btn-warning" (click)="selectCor('amarelo')">Amarela</button>
    <button class="btn btn-danger" (click)="selectCor('vermelho')">Vermelha</button>
  </div>

  @if (currentImages.length > 0) {
    <div class="d-flex flex-wrap justify-content-center gap-3">
      @for (img of currentImages; track img) {
        <img [src]="img" alt="Imagem da sala" style="max-width:500px; height:auto; border-radius:8px;">
      }
    </div>
  }
</div>
