<div class="container py-4">
  <h1 class="section-heading">{{ service?.titulo || 'CATL "O Barco"' }}</h1>
  <div class="section-underline"></div>

  <div class="mt-3" [innerHTML]="service?.descricao || 'O nosso CATL oferece um espaço seguro, educativo e divertido para crianças em idade escolar, no período pós-letivo e durante as pausas escolares.'"></div>
  <p><strong style="color:#2e6f9e;">Capacidade:</strong> cerca de 70 crianças</p>

  <div class="mt-3 mb-4">
    <img [src]="uploadsUrl + 'Biblioteca.jpg'" alt="CATL O Barco - Biblioteca" class="d-block w-100" style="border-radius:8px; max-height:400px; object-fit:cover;">
  </div>

  <h2 class="section-heading text-center">Atividades</h2>
  <div class="section-underline"></div>

  <div class="row g-4 mt-2">
    <div class="col-md-6">
      <div class="card border-0 shadow-sm h-100 p-3">
        <h3><i class="fas fa-running me-2" style="color:#2e6f9e;"></i>Desporto</h3>
        <p>Atividades físicas como desenvolvimento físico, emocional e social.</p>
      </div>
    </div>
    <div class="col-md-6">
      <div class="card border-0 shadow-sm h-100 p-3">
        <h3><i class="fas fa-palette me-2" style="color:#2e6f9e;"></i>Arte e Criatividade</h3>
        <p>Estímulo da expressão artística através da pintura, música, teatro e atividades criativas.</p>
      </div>
    </div>
  </div>
</div>
