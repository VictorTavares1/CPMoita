<div>
  <div class="d-flex align-items-center gap-2 mb-4">
    <a routerLink="/admin/contactos" class="btn btn-outline-secondary btn-sm">
      <i class="fa-solid fa-arrow-left"></i>
    </a>
    <h4 class="mb-0 fw-semibold">Novo Contacto</h4>
  </div>

  @if (error()) {
    <div class="alert alert-danger py-2 small">{{ error() }}</div>
  }

  <div class="card border-0 shadow-sm">
    <div class="card-body">
      <div class="mb-3">
        <label class="form-label">Tipo <span class="text-danger">*</span></label>
        <select class="form-select" [(ngModel)]="tipo">
          <option value="">Selecione um tipo...</option>
          @for (t of tiposDisponiveis; track t) {
            <option [value]="t">{{ t }}</option>
          }
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">Valor <span class="text-danger">*</span></label>
        <input type="text" class="form-control" [(ngModel)]="valor"
          placeholder="Ex: +351 212 159 200 ou geral@email.pt">
      </div>

      <div class="mb-4">
        <label class="form-label">Classe do Ícone (FontAwesome) <span class="text-danger">*</span></label>
        <input type="text" class="form-control" [(ngModel)]="icone"
          placeholder="Ex: fa-solid fa-phone">
        @if (icone) {
          <div class="mt-2 text-muted small">
            Pré-visualização: <i [class]="icone"></i> {{ icone }}
          </div>
        }
      </div>

      <div class="d-flex gap-2">
        <button class="btn btn-primary" (click)="save()" [disabled]="saving()">
          @if (saving()) { <span class="spinner-border spinner-border-sm me-1"></span> }
          Guardar
        </button>
        <a routerLink="/admin/contactos" class="btn btn-outline-secondary">Cancelar</a>
      </div>
    </div>
  </div>
</div>
