<div class="min-vh-100 d-flex align-items-center justify-content-center" style="background-color:#2e6f9e;">
  <div class="text-center w-100">

    <div class="mb-4 text-white">
      <img src="/images/CPMLogo.png" alt="CPM" class="img-fluid mb-2" style="max-width:50px;">
      <h5 class="fw-light">Centro Paroquial da Moita</h5>
      <p class="small opacity-75 mb-0">Painel de Administração</p>
    </div>

    <div class="card mx-auto shadow border-0 rounded-4" style="max-width:420px;">
      <div class="card-body p-4 text-start">

        @if (error()) {
          <div class="alert alert-danger py-2 small">{{ error() }}</div>
        }

        <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
          <div class="mb-3">
            <label class="form-label fw-semibold">
              Endereço de email <span class="text-danger">*</span>
            </label>
            <input
              type="email"
              class="form-control"
              [(ngModel)]="email"
              name="email"
              required
              autocomplete="email"
            >
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">
              Password <span class="text-danger">*</span>
            </label>
            <input
              type="password"
              class="form-control"
              [(ngModel)]="password"
              name="password"
              required
              autocomplete="current-password"
            >
          </div>

          <div class="d-grid">
            <button
              type="submit"
              class="btn text-white fw-semibold"
              style="background-color:#2e6f9e;"
              [disabled]="loading() || !loginForm.valid"
            >
              @if (loading()) {
                <span class="spinner-border spinner-border-sm me-2"></span>A entrar...
              } @else {
                Entrar
              }
            </button>
          </div>
        </form>

      </div>
    </div>

  </div>
</div>
