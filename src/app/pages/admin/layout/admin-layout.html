<div class="admin-wrapper">

  <!-- Sidebar -->
  <nav class="admin-sidebar">
    <div class="sidebar-header">
      <img src="/images/CPMLogo.png" alt="CPM" style="max-width:36px;">
      <span class="sidebar-title">CPM Admin</span>
    </div>

    <ul class="sidebar-nav">
      <li>
        <a routerLink="/admin/dashboard" routerLinkActive="active">
          <i class="fa-solid fa-gauge"></i> Dashboard
        </a>
      </li>
      <li class="nav-section">Conteúdo</li>
      <li>
        <a routerLink="/admin/noticias" routerLinkActive="active">
          <i class="fa-solid fa-newspaper"></i> Notícias
        </a>
      </li>
      <li>
        <a routerLink="/admin/relatorios" routerLinkActive="active">
          <i class="fa-solid fa-file-pdf"></i> Relatórios
        </a>
      </li>
      <li class="nav-section">Gestão</li>
      <li>
        <a routerLink="/admin/servicos" routerLinkActive="active">
          <i class="fa-solid fa-hand-holding-heart"></i> Serviços
        </a>
      </li>
      <li>
        <a routerLink="/admin/contactos" routerLinkActive="active">
          <i class="fa-solid fa-address-book"></i> Contactos
        </a>
      </li>
      <li>
        <a routerLink="/admin/paginas" routerLinkActive="active">
          <i class="fa-solid fa-file-lines"></i> Páginas
        </a>
      </li>
      <li class="nav-section">Sistema</li>
      <li>
        <a routerLink="/admin/admins" routerLinkActive="active">
          <i class="fa-solid fa-users-gear"></i> Administradores
        </a>
      </li>
      <li>
        <a routerLink="/admin/logs" routerLinkActive="active">
          <i class="fa-solid fa-list-check"></i> Registos
        </a>
      </li>
    </ul>

    <div class="sidebar-footer">
      <span class="user-email">{{ auth.getEmail() }}</span>
      <button class="btn-logout" (click)="logout()">
        <i class="fa-solid fa-right-from-bracket"></i> Sair
      </button>
    </div>
  </nav>

  <!-- Main content -->
  <main class="admin-main">
    <router-outlet></router-outlet>
  </main>

</div>
