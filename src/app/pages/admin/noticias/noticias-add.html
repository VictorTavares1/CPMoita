<div>
  <div class="d-flex align-items-center gap-3 mb-4">
    <a routerLink="/admin/noticias" class="btn btn-outline-secondary btn-sm">
      <i class="fa-solid fa-arrow-left"></i>
    </a>
    <h4 class="mb-0 fw-semibold">Inserir Notícia</h4>
  </div>

  @if (error()) {
    <div class="alert alert-danger py-2 small">{{ error() }}</div>
  }

  <div class="card border-0 shadow-sm">
    <div class="card-body p-4">
      <div class="row g-3">

        <div class="col-md-6">
          <label class="form-label fw-semibold">Título <span class="text-danger">*</span></label>
          <input type="text" class="form-control" [(ngModel)]="titulo" placeholder="Título da notícia">
        </div>

        <div class="col-md-6">
          <label class="form-label fw-semibold">Imagens</label>
          <input type="file" class="form-control" id="imgInput" multiple accept="image/*">
        </div>

        <div class="col-12">
          <label class="form-label fw-semibold">Conteúdo <span class="text-danger">*</span></label>
          <div id="editor" style="height:320px;"></div>
        </div>

        <div class="col-12 d-flex gap-2 justify-content-end">
          <a routerLink="/admin/noticias" class="btn btn-outline-secondary">Cancelar</a>
          <button class="btn btn-primary" (click)="submit()" [disabled]="loading()">
            @if (loading()) {
              <span class="spinner-border spinner-border-sm me-1"></span>
            }
            Inserir Notícia
          </button>
        </div>

      </div>
    </div>
  </div>
</div>
