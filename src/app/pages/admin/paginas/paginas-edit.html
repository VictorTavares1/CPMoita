<div>
  <div class="d-flex align-items-center gap-2 mb-4">
    <a routerLink="/admin/paginas" class="btn btn-outline-secondary btn-sm">
      <i class="fa-solid fa-arrow-left"></i>
    </a>
    <h4 class="mb-0 fw-semibold">Editar Conteúdo</h4>
  </div>

  @if (loading()) {
    <div class="text-center py-5 text-muted">
      <span class="spinner-border spinner-border-sm me-2"></span>A carregar...
    </div>
  } @else {
    @if (error()) {
      <div class="alert alert-danger py-2 small">{{ error() }}</div>
    }

    <div class="card border-0 shadow-sm">
      <div class="card-body">
        <div class="row mb-3">
          <div class="col-md-4">
            <label class="form-label small text-muted">Página</label>
            <p class="fw-semibold mb-0">{{ pagina }}</p>
          </div>
          <div class="col-md-4">
            <label class="form-label small text-muted">Chave</label>
            <p class="fw-semibold mb-0">{{ chave }}</p>
          </div>
          <div class="col-md-4">
            <label class="form-label small text-muted">Tipo</label>
            <p class="mb-0"><span class="badge bg-secondary">{{ tipo }}</span></p>
          </div>
        </div>

        <hr>

        <div class="mb-4">
          <label class="form-label">Conteúdo</label>
          @if (tipo === 'html') {
            <textarea class="form-control font-monospace" [(ngModel)]="conteudoPagina" rows="6"></textarea>
            <div class="mt-2 p-3 border rounded bg-light small">
              <strong>Pré-visualização:</strong>
              <div class="mt-1" [innerHTML]="conteudoPagina"></div>
            </div>
          } @else {
            <input type="text" class="form-control" [(ngModel)]="conteudoPagina">
          }
        </div>

        <div class="d-flex gap-2">
          <button class="btn btn-primary" (click)="save()" [disabled]="saving()">
            @if (saving()) { <span class="spinner-border spinner-border-sm me-1"></span> }
            Guardar
          </button>
          <a routerLink="/admin/paginas" class="btn btn-outline-secondary">Cancelar</a>
        </div>
      </div>
    </div>
  }
</div>
